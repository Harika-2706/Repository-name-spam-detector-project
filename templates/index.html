<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            padding: 50px;
            color: white;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            color: black;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
        }

        .check {
            background: #28a745;
            color: white;
        }

        .report {
            background: #dc3545;
            color: white;
        }

        .history {
            background: #007bff;
            color: white;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #confidence {
            font-size: 16px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📩 Spam Detection App</h2>

    <input type="text" id="message" placeholder="Enter your message">

    <br>

    <button class="check" onclick="checkSpam()">Check Spam</button>
    <button class="report" onclick="reportSpam()">Report Spam</button>

    <br>

    <a href="/history">
        <button class="history">View Reported Spam</button>
    </a>

    <div id="result"></div>
    <div id="confidence"></div>
</div>

<script>
function checkSpam() {
    let msg = document.getElementById("message").value;

    fetch('/predict', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.result;
        document.getElementById("confidence").innerText =
            "Confidence: " + data.confidence + "%";
    });
}

function reportSpam() {
    let msg = document.getElementById("message").value;

    fetch('/report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.status;
        document.getElementById("confidence").innerText = "";
    });
}
</script>

</body>
</html>
